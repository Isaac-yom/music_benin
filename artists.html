<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artistes — BéninMusic</title>
  <meta name="description" content="Découvrez tous les artistes musicaux béninois, leurs biographies, discographies et chansons.">
  <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/0/0a/Flag_of_Benin.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <link rel="stylesheet" href="style.css">
  <style>
    .pagination { display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;margin:2rem 0; }
    .page-btn {
      min-width:38px;height:38px;padding:0 0.75rem;
      border:1.5px solid var(--gray-2);border-radius:8px;
      background:#fff;font-family:'Syne',sans-serif;font-size:0.85rem;font-weight:600;
      cursor:pointer;color:var(--dark);transition:all 0.2s;display:flex;align-items:center;justify-content:center;
    }
    .page-btn:hover { border-color:var(--green);color:var(--green); }
    .page-btn.active { background:var(--green);color:#fff;border-color:var(--green); }
    .page-btn:disabled { opacity:0.4;cursor:not-allowed; }
  </style>
</head>
<body>

  <div class="music-quote-strip" style="height:4px;min-height:4px;"></div>
  <div id="app-header" data-active="artists"></div>

  <div style="max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem;">

    <div style="text-align:center;padding:2rem 0 3rem;">
      <h1 style="font-family:'Syne',sans-serif;font-size:clamp(1.8rem,3vw,3rem);font-weight:800;margin-bottom:0.5rem;">
        <span class="text-gradient">Artistes Béninois</span>
      </h1>
      <p style="color:var(--text-light);font-size:0.95rem;margin-bottom:2rem;">
        Pionniers, nouvelle génération et talents émergents du Bénin.
      </p>
      <div id="artist-search-wrap" style="max-width:500px;margin:0 auto;display:flex;align-items:center;gap:10px;background:var(--gray);border-radius:var(--radius-full);padding:12px 20px;border:1.5px solid var(--gray-2);transition:all 0.2s;">
        <i class="fas fa-search" style="color:var(--gray-3);"></i>
        <input type="text" id="artist-search"
          placeholder="Rechercher un artiste…"
          style="border:none;background:none;outline:none;font-size:0.95rem;color:var(--text);width:100%;font-family:'Figtree',sans-serif;">
      </div>
    </div>

    <div id="filter-bar" style="display:flex;gap:0.6rem;flex-wrap:wrap;margin-bottom:2rem;">
      <button class="filter-btn active" data-filter="all">
        <i class="fas fa-th-large" style="margin-right:5px;"></i>Tous
      </button>
      <button class="filter-btn" data-filter="pioneer">
        <i class="fas fa-trophy" style="margin-right:5px;"></i>Pionniers
      </button>
      <button class="filter-btn" data-filter="new">
        <i class="fas fa-rocket" style="margin-right:5px;"></i>Nouvelle génération
      </button>
      <button class="filter-btn" data-filter="emerging">
        <i class="fas fa-star" style="margin-right:5px;"></i>Émergents
      </button>
    </div>

    <p id="results-count" style="font-size:0.85rem;color:var(--text-light);margin-bottom:1.5rem;"></p>

    <div id="artists-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:2rem;min-height:200px;">
      <div style="grid-column:1/-1;text-align:center;padding:3rem;">
        <div class="loading-spinner"></div>
      </div>
    </div>

    <div id="artists-empty" style="display:none;text-align:center;padding:4rem 1rem;">
      <i class="fas fa-music" style="font-size:3rem;color:var(--green);margin-bottom:1rem;display:block;"></i>
      <h3 style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:0.5rem;">Aucun artiste trouvé</h3>
      <p style="color:var(--text-light);font-size:0.9rem;">Essaie un autre filtre ou ajoute des artistes depuis le dashboard.</p>
    </div>

    <!-- PAGINATION -->
    <div class="pagination" id="pagination"></div>
  </div>

  <div id="app-footer"></div>
  <div id="cookie-slot"></div>

  <script src="js/components.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/analytics.js"></script>
  <script>
  var allArtists    = [];
  var activeFilter  = 'all';
  var searchQuery   = '';
  var currentPage   = 1;
  var PAGE_SIZE     = 9; // artistes par page

  var GEN_LABELS = { pioneer: 'Pionnier', new: 'Nouvelle génération', emerging: 'Émergent' };
  var GEN_ICONS  = { pioneer: 'fa-trophy', new: 'fa-rocket', emerging: 'fa-star' };
  var GEN_COLORS = { pioneer: 'rgba(252,209,22,0.15)', new: 'rgba(0,120,71,0.12)', emerging: 'rgba(206,17,38,0.1)' };
  var GEN_TEXT   = { pioneer: '#997a00', new: '#007847', emerging: '#CE1126' };

  function goToArtist(slug) {
    if (!slug || slug.trim() === '') return;
    window.location.href = 'artist-profile.html#' + encodeURIComponent(slug.trim());
  }

  function renderCard(a) {
    if (!a.slug || a.slug.trim() === '') {
      a.slug = a.name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'').replace(/-+/g,'-');
    }

    var img = a.image_url
      ? a.image_url
      : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(a.name) + '&background=007847&color=fff&size=230&bold=true';

    var genBadge = '';
    if (a.generation && GEN_LABELS[a.generation]) {
      genBadge = '<span style="display:inline-block;padding:0.2rem 0.7rem;border-radius:999px;font-size:0.72rem;font-weight:700;margin-bottom:0.5rem;background:' +
        GEN_COLORS[a.generation] + ';color:' + GEN_TEXT[a.generation] + ';">' +
        '<i class="fas ' + GEN_ICONS[a.generation] + '" style="margin-right:4px;"></i>' +
        GEN_LABELS[a.generation] + '</span>';
    }

    var verifiedBadge = a.is_verified
      ? '<span style="position:absolute;top:12px;right:12px;background:var(--green);color:white;border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;box-shadow:0 2px 8px rgba(0,120,71,0.4);"><i class="fas fa-check"></i></span>'
      : '';

    var socials = '';
    if (a.spotify_url)   socials += '<a href="' + a.spotify_url   + '" target="_blank" rel="noopener" title="Spotify"   style="color:#1DB954;font-size:1.1rem;" onclick="event.stopPropagation()"><i class="fab fa-spotify"></i></a>';
    if (a.youtube_url)   socials += '<a href="' + a.youtube_url   + '" target="_blank" rel="noopener" title="YouTube"   style="color:#CE1126;font-size:1.1rem;" onclick="event.stopPropagation()"><i class="fab fa-youtube"></i></a>';
    if (a.instagram_url) socials += '<a href="' + a.instagram_url + '" target="_blank" rel="noopener" title="Instagram" style="color:#E1306C;font-size:1.1rem;" onclick="event.stopPropagation()"><i class="fab fa-instagram"></i></a>';

    var socialsDiv = socials ? '<div style="display:flex;gap:0.8rem;margin-top:0.6rem;">' + socials + '</div>' : '';
    var bioSnippet = a.bio ? '<p style="font-size:0.82rem;color:var(--text-light);margin-top:0.4rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">' + a.bio + '</p>' : '';
    var genreCity  = (a.genre || '') + (a.genre && a.city ? ' · ' : '') + (a.city || '');
    var profileLink = 'artist-profile.html#' + encodeURIComponent(a.slug);

    return '<article class="artist-card" data-slug="' + a.slug + '" style="cursor:pointer;position:relative;">' +
      '<div class="artist-image" style="position:relative;">' +
        '<img src="' + img + '" alt="' + a.name + '" loading="lazy">' + verifiedBadge +
      '</div>' +
      '<div class="artist-info">' +
        genBadge +
        '<h3 class="artist-name">' + a.name + '</h3>' +
        '<p class="artist-role" style="font-size:0.83rem;color:var(--text-light);">' + genreCity + '</p>' +
        bioSnippet + socialsDiv +
        '<div class="artist-actions" style="margin-top:0.8rem;">' +
          '<a href="' + profileLink + '" class="artist-link">' +
            '<i class="fas fa-user" style="margin-right:5px;"></i>Voir le profil' +
          '</a>' +
        '</div>' +
      '</div>' +
    '</article>';
  }

  function getFiltered() {
    var filtered = allArtists.slice();
    if (activeFilter !== 'all') {
      filtered = filtered.filter(function(a) { return a.generation === activeFilter; });
    }
    if (searchQuery) {
      filtered = filtered.filter(function(a) {
        return a.name.toLowerCase().indexOf(searchQuery) !== -1 ||
          (a.genre || '').toLowerCase().indexOf(searchQuery) !== -1 ||
          (a.city  || '').toLowerCase().indexOf(searchQuery) !== -1 ||
          (a.bio   || '').toLowerCase().indexOf(searchQuery) !== -1;
      });
    }
    return filtered;
  }

  function renderPagination(total, current) {
    var pages = Math.ceil(total / PAGE_SIZE);
    var pag = document.getElementById('pagination');
    if (pages <= 1) { pag.innerHTML = ''; return; }

    var html = '';
    // Bouton précédent
    html += '<button class="page-btn" onclick="goPage(' + (current-1) + ')" ' + (current===1?'disabled':'') + '>' +
      '<i class="fas fa-chevron-left"></i></button>';

    for (var i = 1; i <= pages; i++) {
      html += '<button class="page-btn' + (i===current?' active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }

    // Bouton suivant
    html += '<button class="page-btn" onclick="goPage(' + (current+1) + ')" ' + (current===pages?'disabled':'') + '>' +
      '<i class="fas fa-chevron-right"></i></button>';

    pag.innerHTML = html;
  }

  function goPage(page) {
    currentPage = page;
    applyFilters();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function applyFilters() {
    var grid  = document.getElementById('artists-grid');
    var empty = document.getElementById('artists-empty');
    var count = document.getElementById('results-count');

    var filtered = getFiltered();

    if (filtered.length === 0) {
      grid.innerHTML = '';
      grid.style.display = 'none';
      empty.style.display = 'block';
      count.textContent = '';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    // Pagination
    var totalPages = Math.ceil(filtered.length / PAGE_SIZE);
    if (currentPage > totalPages) currentPage = 1;
    var start = (currentPage - 1) * PAGE_SIZE;
    var page  = filtered.slice(start, start + PAGE_SIZE);

    grid.style.display = 'grid';
    empty.style.display = 'none';
    grid.innerHTML = page.map(renderCard).join('');
    count.textContent = filtered.length + ' artiste' + (filtered.length > 1 ? 's' : '') + ' trouvé' + (filtered.length > 1 ? 's' : '');

    renderPagination(filtered.length, currentPage);

    // Clic sur la carte
    grid.querySelectorAll('.artist-card[data-slug]').forEach(function(card) {
      card.addEventListener('click', function(e) {
        if (e.target.closest('a')) return;
        goToArtist(card.dataset.slug);
      });
    });
  }

  document.addEventListener('DOMContentLoaded', async function() {
    var grid = document.getElementById('artists-grid');
    var result = await _supabase.from('artists').select('*').order('name');

    if (result.error) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--red);padding:2rem;"><i class="fas fa-exclamation-triangle"></i> ' + result.error.message + '</div>';
      return;
    }

    allArtists = result.data || [];
    applyFilters();

    // Filtres
    document.querySelectorAll('#filter-bar .filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#filter-bar .filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        currentPage = 1;
        applyFilters();
      });
    });

    // Recherche
    var sw = document.getElementById('artist-search-wrap');
    var si = document.getElementById('artist-search');
    sw.addEventListener('focusin',  function() { sw.style.borderColor='var(--yellow)';sw.style.background='white';sw.style.boxShadow='0 0 0 3px rgba(252,209,22,0.15)'; });
    sw.addEventListener('focusout', function() { sw.style.borderColor='var(--gray-2)';sw.style.background='var(--gray)';sw.style.boxShadow='none'; });

    var timer;
    si.addEventListener('input', function() {
      clearTimeout(timer);
      timer = setTimeout(function() {
        searchQuery = si.value.toLowerCase().trim();
        currentPage = 1;
        applyFilters();
      }, 250);
    });
  });
  </script>
</body>
</html>
