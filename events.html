<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Événements — BéninMusic</title>
  <meta name="description" content="Concerts, festivals et événements musicaux béninois. Ne ratez aucun événement.">
  <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/0/0a/Flag_of_Benin.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="music-quote-strip" style="height:4px;min-height:4px;"></div>
  <div id="app-header" data-active="events"></div>

  <div class="events-page">

    <div style="margin-bottom:2.5rem;">
      <h1 class="events-page-title">
        <span class="text-gradient">Événements</span>
        <i class="fas fa-calendar-alt" style="font-size:1.8rem;margin-left:0.5rem;color:var(--green);"></i>
      </h1>
      <p style="color:var(--text-light);font-size:0.95rem;margin-top:0.5rem;">
        Concerts, festivals, showcases et sorties d'albums en Bénin et dans la diaspora.
      </p>
    </div>

    <!-- Filtres -->
    <div class="events-filter" id="filter-bar">
      <button class="filter-btn active" data-filter="all">
        <i class="fas fa-th-large" style="margin-right:5px;"></i>Tous
      </button>
      <button class="filter-btn" data-filter="concert">
        <i class="fas fa-microphone" style="margin-right:5px;"></i>Concerts
      </button>
      <button class="filter-btn" data-filter="festival">
        <i class="fas fa-music" style="margin-right:5px;"></i>Festivals
      </button>
      <button class="filter-btn" data-filter="showcase">
        <i class="fas fa-star" style="margin-right:5px;"></i>Showcases
      </button>
      <button class="filter-btn" data-filter="album">
        <i class="fas fa-compact-disc" style="margin-right:5px;"></i>Albums
      </button>
    </div>

    <!-- Grille -->
    <div class="events-grid" id="events-grid">
      <div style="grid-column:1/-1;text-align:center;padding:4rem;">
        <div class="loading-spinner"></div>
        <p style="color:var(--gray-3);margin-top:1rem;font-size:0.9rem;">Chargement des événements…</p>
      </div>
    </div>

    <!-- État vide -->
    <div class="empty-state hidden" id="no-events">
      <div class="empty-state-icon"><i class="fas fa-calendar-times" style="font-size:3rem;color:var(--green);"></i></div>
      <div class="empty-state-title">Aucun événement</div>
      <div class="empty-state-text">Revenez bientôt pour voir les prochains événements musicaux béninois.</div>
    </div>

  </div>

  <div id="app-footer"></div>
  <div id="cookie-slot"></div>

  <script src="js/components.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/analytics.js"></script>
  <script>
  var allEvents     = [];
  var activeFilter  = 'all';

  var CAT_LABELS = { concert:'Concert', festival:'Festival', showcase:'Showcase', album:'Sortie album', other:'Autre' };
  var CAT_ICONS  = { concert:'fa-microphone', festival:'fa-music', showcase:'fa-star', album:'fa-compact-disc', other:'fa-calendar' };

  document.addEventListener('DOMContentLoaded', async function() {
    var res = await _supabase.from('events').select('*').order('event_date', { ascending: true });

    if (res.error || !res.data) {
      document.getElementById('events-grid').innerHTML = '';
      document.getElementById('no-events').classList.remove('hidden');
      return;
    }

    allEvents = res.data;
    renderEvents(allEvents);

    // Filtres
    document.querySelectorAll('#filter-bar .filter-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('#filter-bar .filter-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        var filtered = activeFilter === 'all' ? allEvents : allEvents.filter(function(e){ return e.category === activeFilter; });
        renderEvents(filtered);
      });
    });
  });

  function renderEvents(events) {
    var grid     = document.getElementById('events-grid');
    var noEvents = document.getElementById('no-events');

    if (!events.length) {
      grid.innerHTML = '';
      noEvents.classList.remove('hidden');
      return;
    }

    noEvents.classList.add('hidden');

    grid.innerHTML = events.map(function(ev) {
      var d       = new Date(ev.event_date);
      var dateStr = d.toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      var timeStr = d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      var cat     = ev.category || 'concert';
      var icon    = CAT_ICONS[cat] || 'fa-calendar';
      var label   = CAT_LABELS[cat] || cat;
      var img     = ev.image_url || 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=600&q=80';
      var detailLink = 'event-detail.html#' + encodeURIComponent(ev.id);

      return '<div class="event-card">' +
        '<div class="event-card-img">' +
          '<img src="' + img + '" alt="' + ev.title + '" loading="lazy">' +
          '<span class="event-badge ' + cat + '"><i class="fas ' + icon + '" style="margin-right:4px;"></i>' + label + '</span>' +
          (ev.is_free ? '<span class="event-free-badge">Gratuit</span>' : '') +
        '</div>' +
        '<div class="event-card-body">' +
          '<div class="event-card-date">' +
            '<i class="fas fa-calendar-alt"></i> ' + dateStr + ' à ' + timeStr +
          '</div>' +
          '<h3 class="event-card-title">' + ev.title + '</h3>' +
          (ev.description ? '<p style="font-size:0.85rem;color:var(--text-light);margin-bottom:0.8rem;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">' + ev.description + '</p>' : '') +
          '<div class="event-card-location">' +
            '<i class="fas fa-map-marker-alt" style="color:var(--green);"></i> ' +
            (ev.location || ev.city || 'Bénin') + (ev.city && ev.country ? ', ' + ev.country : '') +
          '</div>' +
          '<div class="event-card-footer">' +
            '<div class="event-price">' +
              (ev.is_free
                ? '<span style="color:var(--green);font-weight:700;"><i class="fas fa-ticket-alt" style="margin-right:4px;"></i>Gratuit</span>'
                : (ev.price
                  ? '<span><i class="fas fa-tag" style="margin-right:4px;color:var(--yellow);"></i>' + ev.price + '</span>'
                  : '<span style="color:var(--gray-3);font-size:0.85rem;">Prix à confirmer</span>')) +
            '</div>' +
            '<a href="' + detailLink + '" class="event-ticket-btn" style="background:var(--green);color:#fff;border-radius:999px;padding:0.45rem 1.1rem;font-size:0.82rem;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:6px;">' +
              '<i class="fas fa-eye"></i> Voir détails' +
            '</a>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');
  }
  </script>
</body>
</html>
