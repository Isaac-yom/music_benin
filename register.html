<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inscription — BéninMusic</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="https://upload.wikimedia.org/wikipedia/commons/0/0a/Flag_of_Benin.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-page">

    <!-- LEFT -->
    <div class="auth-left">
      <div class="auth-left-bg"></div>
      <div class="auth-left-content">
        <div class="auth-left-logo">🇧🇯 BéninMusic</div>
        <p class="auth-left-tagline">
          Rejoins des milliers de fans de musique béninoise.<br>
          Partage tes actualités, suis tes artistes préférés.
        </p>
      </div>
    </div>

    <!-- RIGHT FORM -->
    <div class="auth-right">
      <div class="auth-box">

        <a href="index.html" style="display:inline-flex;align-items:center;gap:6px;font-size:0.85rem;color:var(--text-light);margin-bottom:2rem;transition:color 0.2s;" onmouseover="this.style.color='var(--green)'" onmouseout="this.style.color='var(--text-light)'">
          <i class="fas fa-arrow-left"></i> Retour 
        </a>

        <h1 class="auth-title">Crée ton compte</h1>
        <p class="auth-subtitle">
          Rejoins la communauté musicale béninoise gratuitement.<br>
        </p>

        <!-- Global error -->
        <div id="global-error" class="hidden" style="background:rgba(206,17,38,0.08);border:1.5px solid var(--red);border-radius:10px;padding:12px 16px;font-size:0.85rem;color:var(--red);margin-bottom:1.2rem;"></div>

        <form id="register-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="display-name">
              Nom affiché 
            </label>
            <input
              type="text"
              class="form-input"
              id="display-name"
              name="display_name"
              placeholder="Ton nom"
              autocomplete="name"
            >
            <div class="form-error" id="display-name-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="username">
              Nom d'utilisateur 
            </label>
            <div style="position:relative;">
              <span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray-3);font-size:0.9rem;">@</span>
              <input
                type="text"
                class="form-input"
                id="username"
                name="username"
                placeholder="ton_pseudo"
                autocomplete="username"
                style="padding-left:30px;"
              >
            </div>
            <div class="form-error" id="username-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="email">
              Email 
            </label>
            <input
              type="email"
              class="form-input"
              id="email"
              name="email"
              placeholder="ton@email.com"
              autocomplete="email"
            >
            <div class="form-error" id="email-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">
              Mot de passe 
            </label>
            <div class="input-group">
              <input
                type="password"
                class="form-input"
                id="password"
                name="password"
                placeholder="Minimum 8 caractères"
                autocomplete="new-password"
              >
              <span class="input-toggle" id="toggle-password">
                <i class="fas fa-eye"></i>
              </span>
            </div>
            <div class="form-error" id="password-error"></div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm-password">
              Confirmer le mot de passe 
            </label>
            <input
              type="password"
              class="form-input"
              id="confirm-password"
              name="confirm_password"
              placeholder="••••••••"
              autocomplete="new-password"
            >
            <div class="form-error" id="confirm-password-error"></div>
          </div>

          <div style="margin-bottom:1.5rem;display:flex;gap:10px;align-items:flex-start;">
            <input type="checkbox" id="terms" style="margin-top:3px;accent-color:var(--green);width:16px;height:16px;flex-shrink:0;">
            <label for="terms" style="font-size:0.83rem;color:var(--text-light);cursor:pointer;line-height:1.5;">
              J'accepte les <a href="legal.html" target="_blank" style="color:var(--green);">conditions d'utilisation</a> et la
              <a href="privacy.html" target="_blank" style="color:var(--green);">politique de confidentialité</a>.
            </label>
          </div>

          <button type="submit" class="auth-submit" id="register-submit">
            Créer mon compte 
          </button>

        </form>

        <div class="auth-switch">
          Déjà un compte ?
          <a href="login.html">Se connecter →</a>
        </div>

      </div>
    </div>
  </div>

  <!-- COOKIE + SCROLL -->
  <div id="cookie-slot"></div>

  <script src="js/components.js"></script>
  <script src="js/script.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/analytics.js"></script>
</body>
</html>
